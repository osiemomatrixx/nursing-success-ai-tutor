services:
  - type: web
    name: nursing-success-ai-tutor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ALLOW_ORIGINS
        value: "*"
